<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xotic PC RMA Tracker</title>
  <style>
    :root {
      --bg:#e9edf1; --card:#e7ebef; --line:#c4ced9; --text:#1f2937; --muted:#6b7280; --blue:#4f7db8; --radius:18px; --shadow:0 6px 16px rgba(31,41,55,.04);
    }
    * { box-sizing:border-box; }
    html,body { margin:0; padding:0; font-family:Arial,Helvetica,sans-serif; background:var(--bg); color:var(--text); }
    body { overflow-x:hidden; }
    .app { max-width:1400px; margin:0 auto; padding:12px; }
    .topbar { display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .title h1 { margin:0; font-size:28px; }
    .title p { margin:4px 0 0; color:var(--muted); font-size:14px; }
    button,select,input,textarea { font:inherit; color:var(--text); }
    button { border:1px solid var(--line); background:var(--card); border-radius:14px; padding:10px 14px; cursor:pointer; }
    button.primary { background:var(--blue); color:#f8fafc; border-color:var(--blue); }
    .card { background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); }
    .banner { padding:10px 12px; margin-bottom:12px; border-radius:14px; display:none; }
    .banner.info { display:block; background:#dde6ef; border:1px solid var(--line); color:var(--muted); }
    .banner.error { display:block; background:#efdddd; border:1px solid #d8b7b7; color:#7f1d1d; }
    .layout { display:grid; grid-template-columns:360px minmax(0,1fr); gap:12px; }
    .panel { padding:14px; }
    .filters { display:flex; flex-direction:column; gap:10px; margin-bottom:12px; }
    .tabs { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .tabs button.active { background:var(--blue); color:#f8fafc; border-color:var(--blue); }
    input,select,textarea { width:100%; border:1px solid var(--line); border-radius:12px; padding:10px 12px; background:#e9edf1; }
    textarea { min-height:90px; resize:vertical; }
    input[type="checkbox"] { width:16px; height:16px; accent-color:var(--blue); }
    .record-list { display:flex; flex-direction:column; gap:10px; max-height:78vh; overflow:auto; }
    .record-item { padding:14px; border:2px solid var(--line); border-radius:20px; background:#e9edf1; text-align:left; width:100%; }
    .record-item.selected { outline:2px solid #cbd5e1; }
    .record-item.waiting { border-color:var(--blue); }
    .record-top { display:flex; justify-content:space-between; gap:10px; }
    .badge { padding:5px 10px; border-radius:999px; border:1px solid var(--line); font-size:12px; max-width:140px; text-align:center; }
    .muted { color:var(--muted); }
    .small { font-size:12px; line-height:1.35; }
    .tiny { font-size:11px; line-height:1.35; }
    .grid-4,.grid-2 { display:grid; gap:10px; }
    .grid-4 { grid-template-columns:repeat(4,minmax(0,1fr)); }
    .grid-2 { grid-template-columns:repeat(2,minmax(0,1fr)); }
    .field,.field-full { display:flex; flex-direction:column; gap:6px; }
    .field label,.section-title { font-size:12px; color:var(--muted); font-weight:700; }
    .warranty-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px; }
    .warranty-item,.check-item { display:flex; align-items:center; gap:8px; border:1px solid var(--line); border-radius:10px; padding:8px 10px; background:#e9edf1; font-size:11px; }
    .warranty-item span,.check-item span { flex:1 1 auto; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .two-column { display:grid; grid-template-columns:1.2fr .8fr; gap:12px; }
    .checklist,.notes-list { display:flex; flex-direction:column; gap:8px; }
    .check-item.done span { text-decoration:line-through; color:#94a3b8; }
    .note-box { border:1px solid var(--line); border-radius:14px; padding:12px; background:#e9edf1; }
    .footer-meta { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; color:var(--muted); font-size:12px; }
    dialog { border:none; border-radius:22px; width:min(920px,calc(100vw - 20px)); padding:0; box-shadow:0 20px 60px rgba(15,23,42,.18); background:var(--card); }
    dialog::backdrop { background:rgba(15,23,42,.35); }
    .dialog-inner { padding:16px; }
    .dialog-title { margin:0 0 14px; font-size:20px; }
    .dialog-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:14px; flex-wrap:wrap; }
    .empty { padding:30px 16px; text-align:center; color:var(--muted); }
    @media (max-width:1100px){ .layout,.two-column{grid-template-columns:1fr}.grid-4{grid-template-columns:repeat(2,minmax(0,1fr))} }
    @media (max-width:700px){ .grid-4,.grid-2,.warranty-grid,.footer-meta{grid-template-columns:1fr 1fr}.topbar{flex-direction:column;align-items:stretch} }
    @media (max-width:520px){ .grid-4,.grid-2,.warranty-grid,.footer-meta,.tabs{grid-template-columns:1fr} button.primary{width:100%} }
  </style>
</head>
<body>
<div class="app">
  <div id="statusBanner" class="banner"></div>
  <div class="topbar">
    <div class="title">
      <h1>Xotic PC RMA Tracker</h1>
      <p>Phone-friendly tracking for diagnostics, notes, status updates, and completed work.</p>
    </div>
    <button id="newRmaBtn" class="primary">New RMA</button>
  </div>

  <div class="layout">
    <div>
      <div class="card panel filters">
        <input id="searchInput" type="text" placeholder="Search order, customer, serial..." />
        <div class="tabs">
          <button data-tab="active" class="tab-btn active">Active</button>
          <button data-tab="completed" class="tab-btn">Completed</button>
          <button data-tab="all" class="tab-btn">All</button>
        </div>
        <select id="statusFilter"></select>
      </div>
      <div id="recordList" class="record-list"></div>
    </div>
    <div id="detailView"></div>
  </div>
</div>

<dialog id="rmaDialog">
  <div class="dialog-inner">
    <h2 class="dialog-title">Create RMA Record</h2>
    <div class="grid-2">
      <div class="field"><label>Order Number</label><input id="formOrderNumber" inputmode="numeric" pattern="[0-9]*" /></div>
      <div class="field"><label>RMA Number</label><input id="formRmaNumber" inputmode="numeric" pattern="[0-9]*" /></div>
      <div class="field"><label>Customer Name</label><input id="formCustomerName" /></div>
      <div class="field"><label>Device Type</label><select id="formDeviceType"></select></div>
      <div class="field"><label>Status</label><select id="formStatus"></select></div>
      <div class="field"><label>Brand / Model</label><input id="formBrandModel" /></div>
      <div class="field"><label>Serial Number</label><input id="formSerialNumber" /></div>
      <div class="field"><label>Windows</label><select id="formWindows"></select></div>
    </div>
    <div style="margin-top:12px;">
      <div class="section-title">Warranty</div>
      <div class="warranty-grid" id="formWarrantyFlags"></div>
    </div>
    <div class="field-full" style="margin-top:12px;"><label>Reported Issues</label><textarea id="formReportedIssues"></textarea></div>
    <div class="field-full" style="margin-top:12px;"><label>Possible Issues / Observations</label><textarea id="formPossibleIssues"></textarea></div>
    <div class="dialog-actions">
      <button id="cancelDialogBtn">Cancel</button>
      <button id="createDialogBtn" class="primary">Create RMA</button>
    </div>
  </div>
</dialog>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://kcdhkjjebgwxozgwjfnm.supabase.co';
const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_6p3LaQ8Pkmm7UL00i9GMdA_r9wc_KRX';
const supabase = createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

const defaultChecklist = ['Visual inspection completed','Boot test completed','Temps checked','RAM tested','Drive tested','Windows & drivers updated','BIOS updated','OCCT / Burn-in Completed','OS reinstalled','Manufacturer contacted','Sent to manufacturer','Passed QA'];
const statusOptions = [
  { value:'diagnosing', label:'Diagnosing' },
  { value:'waiting_parts', label:'Waiting on Parts' },
  { value:'waiting_customer', label:'Waiting on Customer' },
  { value:'sent_manufacturer', label:'Sent to Manufacturer' },
  { value:'repair_progress', label:'Repair/Testing' },
  { value:'pay_shipping', label:'Pay for Shipping' },
  { value:'completed', label:'Completed' }
];
const windowsOptions = [{value:'home',label:'Home'},{value:'pro',label:'Pro'}];
const deviceOptions = [{value:'desktop',label:'Desktop'},{value:'laptop',label:'Laptop'},{value:'other',label:'Other'}];
const warrantyOptions = [
  { key:'inWarranty', label:'In Manufacturer Warranty' },
  { key:'adp', label:'ADP' },
  { key:'partsLabor', label:'Parts & Labor' },
  { key:'shipping', label:'Shipping' }
];
const state = { records:[], selectedId:null, search:'', tab:'active', statusFilter:'all' };

const showBanner = (m,v='info') => { const el=document.getElementById('statusBanner'); el.textContent=m; el.className=`banner ${v}`; };
const clearBanner = () => { const el=document.getElementById('statusBanner'); el.textContent=''; el.className='banner'; };
const numbersOnly = (v) => String(v ?? '').replace(/\D+/g,'');
const statusLabel = (s) => statusOptions.find(x => x.value === s)?.label || s;
const deviceLabel = (t) => t === 'laptop' ? 'Laptop' : t === 'other' ? 'Other' : 'Desktop';
const createDefaultWarrantyFlags = () => ({ shipping:false, inWarranty:false, adp:false, partsLabor:false });
const createDefaultForm = () => ({ orderNumber:'', rmaNumber:'', customerName:'', deviceType:'desktop', brandModel:'', serialNumber:'', warrantyFlags:createDefaultWarrantyFlags(), windowsEdition:'home', status:'diagnosing', reportedIssues:'', possibleIssues:'' });
const escapeHtml = (v) => String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const escapeAttr = (v) => escapeHtml(v).replace(/`/g,'&#96;');

function warrantyFlagsFromRow(row){ return { inWarranty:Boolean(row.in_manufacturer_warranty), adp:Boolean(row.adp), partsLabor:Boolean(row.parts_labor), shipping:Boolean(row.shipping) }; }
function warrantyFlagsToRow(flags){ return { in_manufacturer_warranty:Boolean(flags.inWarranty), adp:Boolean(flags.adp), parts_labor:Boolean(flags.partsLabor), shipping:Boolean(flags.shipping) }; }
function mapRowToRecord(row){
  return {
    id:row.id, orderNumber:row.order_number || '', rmaNumber:row.rma_number || '', customerName:row.customer_name || '',
    deviceType:row.device_type || 'desktop', brandModel:row.brand_model || '', serialNumber:row.serial_number || '',
    warrantyFlags:warrantyFlagsFromRow(row), windowsEdition:row.windows_edition || 'home', status:row.status || 'diagnosing',
    reportedIssues:row.reported_issues || '', possibleIssues:row.possible_issues || '',
    checklist:Array.isArray(row.checklist_json) ? row.checklist_json : defaultChecklist.map(label => ({ label, done:false, completedAt:null })),
    notes:Array.isArray(row.notes_json) ? row.notes_json : [], createdAt:row.created_at || '', updatedAt:row.updated_at || '', completedAt:row.completed_at || null
  };
}
function mapRecordToRow(record){
  return {
    order_number:record.orderNumber, rma_number:record.rmaNumber, customer_name:record.customerName, device_type:record.deviceType,
    brand_model:record.brandModel, serial_number:record.serialNumber, windows_edition:record.windowsEdition, status:record.status,
    reported_issues:record.reportedIssues, possible_issues:record.possibleIssues, checklist_json:record.checklist, notes_json:record.notes,
    completed_at:record.completedAt, ...warrantyFlagsToRow(record.warrantyFlags)
  };
}

async function sendRmaEmail(payload){
  const { error } = await supabase.functions.invoke('send-rma-email', { body: payload });
  if (error) {
    console.error('Email function failed:', error);
    showBanner('Email send failed, but database save still worked.', 'error');
  }
}

async function loadRmas(){
  const { data, error } = await supabase.from('rmas').select('*').order('created_at', { ascending:false });
  if (error) { console.error(error); showBanner('Supabase load failed. Check your URL/key and table columns.', 'error'); return []; }
  clearBanner();
  return (data || []).map(mapRowToRecord);
}
async function createRma(record){
  const { data, error } = await supabase.from('rmas').insert([mapRecordToRow(record)]).select();
  if (error) { console.error(error); showBanner('Create RMA failed. Check RLS policies and table columns.', 'error'); return null; }
  clearBanner(); return data?.[0] ? mapRowToRecord(data[0]) : null;
}
async function updateRma(id, updates){
  const { data, error } = await supabase.from('rmas').update({ ...mapRecordToRow(updates), updated_at:new Date().toISOString() }).eq('id', id).select();
  if (error) { console.error(error); showBanner('Update failed. Check RLS policies.', 'error'); return null; }
  clearBanner(); return data?.[0] ? mapRowToRecord(data[0]) : null;
}

function getFilteredRecords(){
  return state.records
    .filter(r => state.tab === 'active' ? r.status !== 'completed' : state.tab === 'completed' ? r.status === 'completed' : true)
    .filter(r => state.statusFilter === 'all' ? true : r.status === state.statusFilter)
    .filter(r => [r.orderNumber, r.rmaNumber, r.customerName, r.brandModel, r.serialNumber, r.reportedIssues, r.possibleIssues].join(' ').toLowerCase().includes(state.search.toLowerCase()))
    .sort((a,b) => new Date(b.updatedAt || b.createdAt || 0) - new Date(a.updatedAt || a.createdAt || 0));
}
function getSelectedRecord(){ const filtered=getFilteredRecords(); return state.records.find(r => r.id === state.selectedId) || filtered[0] || null; }

function renderSelectOptions(select, options, includeAll){
  select.innerHTML='';
  if (includeAll) {
    const opt=document.createElement('option'); opt.value='all'; opt.textContent='All Statuses'; select.appendChild(opt);
  }
  options.forEach(option => {
    const opt=document.createElement('option'); opt.value=option.value; opt.textContent=option.label; select.appendChild(opt);
  });
}
function renderWarrantyCheckboxes(container, flags, onChange){
  container.innerHTML='';
  warrantyOptions.forEach(option => {
    const label=document.createElement('label'); label.className='warranty-item';
    const input=document.createElement('input'); input.type='checkbox'; input.checked=Boolean(flags[option.key]); input.addEventListener('change',()=>onChange(option.key,input.checked));
    const span=document.createElement('span'); span.textContent=option.label;
    label.append(input, span); container.appendChild(label);
  });
}
function renderRecordList(){
  const list=document.getElementById('recordList'); const filtered=getFilteredRecords(); list.innerHTML='';
  if (!filtered.length) {
    const empty=document.createElement('div'); empty.className='card empty'; empty.innerHTML='<div>No RMAs yet</div><div class="small">Create your first RMA record to start tracking notes, tasks, and status updates.</div>'; list.appendChild(empty); return;
  }
  filtered.forEach(record => {
    const btn=document.createElement('button'); btn.className='record-item';
    if (record.id === state.selectedId) btn.classList.add('selected');
    if (['waiting_parts','waiting_customer','sent_manufacturer','pay_shipping'].includes(record.status)) btn.classList.add('waiting');
    btn.innerHTML = `
      <div class="record-top">
        <div>
          <div><strong>${escapeHtml('#' + record.orderNumber)}</strong>${record.rmaNumber ? `<span class="muted small"> / ${escapeHtml(record.rmaNumber)}</span>` : ''}</div>
          <div class="muted small">${escapeHtml(record.customerName)}</div>
        </div>
        <div class="badge">${escapeHtml(statusLabel(record.status))}</div>
      </div>
      <div class="muted small" style="margin-top:8px;">${escapeHtml(deviceLabel(record.deviceType))}${record.brandModel ? ' • ' + escapeHtml(record.brandModel) : ''}</div>
      <div style="margin-top:8px;" class="small">${escapeHtml(record.reportedIssues || 'No reported issue entered.')}</div>
      <div class="muted tiny" style="margin-top:8px; display:flex; justify-content:space-between; gap:8px;">
        <span>${record.notes.length} notes</span>
        <span>${record.updatedAt ? new Date(record.updatedAt).toLocaleDateString() : ''}</span>
      </div>`;
    btn.addEventListener('click',()=>{ state.selectedId=record.id; render(); });
    list.appendChild(btn);
  });
}
function renderDetail(){
  const detail=document.getElementById('detailView'); const selected=getSelectedRecord();
  if (!selected) { detail.innerHTML='<div class="card empty">Select or create an RMA.</div>'; return; }

  const warrantyHtml=warrantyOptions.map(option=>`<label class="warranty-item"><input type="checkbox" data-warranty-key="${option.key}" ${selected.warrantyFlags[option.key] ? 'checked' : ''} /><span>${escapeHtml(option.label)}</span></label>`).join('');
  const checklistHtml=selected.checklist.map((item,index)=>`<label class="check-item ${item.done ? 'done' : ''}"><input type="checkbox" data-check-index="${index}" ${item.done ? 'checked' : ''} /><span>${escapeHtml(item.label)}</span></label>${item.completedAt ? `<div class="muted tiny" style="margin:-4px 0 4px 30px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Completed ${new Date(item.completedAt).toLocaleString()}</div>` : ''}`).join('');
  const notesHtml=selected.notes.length ? selected.notes.map(note=>`<div class="note-box"><div class="small">${escapeHtml(note.text)}</div><div class="muted tiny" style="margin-top:8px;">${new Date(note.createdAt).toLocaleString()}</div></div>`).join('') : '<div class="muted small">No notes added yet.</div>';

  detail.innerHTML = `
    <div class="card panel">
      <div class="detail-header">
        <div>
          <h2 style="margin:0; font-size:24px;">${escapeHtml('Order #' + selected.orderNumber + (selected.rmaNumber ? ' / ' + selected.rmaNumber : ''))}</h2>
          <div class="muted">${escapeHtml(selected.customerName)}</div>
        </div>
      </div>
      <div class="grid-4">
        <div class="field"><label>Status</label><select id="detailStatus"></select></div>
        <div class="field"><label>Windows</label><select id="detailWindows"></select></div>
        <div class="field"><label>Device Type</label><select id="detailDeviceType"></select></div>
      </div>
      <div style="margin-top:12px;"><div class="section-title">Warranty</div><div class="warranty-grid" id="detailWarrantyGrid">${warrantyHtml}</div></div>
      <div class="grid-2" style="margin-top:12px;">
        <div class="field"><label>RMA Number</label><input id="detailRmaNumber" value="${escapeAttr(selected.rmaNumber || '')}" /></div>
        <div class="field"><label>Brand / Model</label><input id="detailBrandModel" value="${escapeAttr(selected.brandModel)}" /></div>
        <div class="field"><label>Serial Number</label><input id="detailSerialNumber" value="${escapeAttr(selected.serialNumber)}" /></div>
      </div>
      <div class="grid-2" style="margin-top:12px;">
        <div class="field"><label>Reported Issues</label><textarea id="detailReportedIssues">${escapeHtml(selected.reportedIssues)}</textarea></div>
        <div class="field"><label>Possible Issues / Observations</label><textarea id="detailPossibleIssues">${escapeHtml(selected.possibleIssues)}</textarea></div>
      </div>
      <div class="two-column" style="margin-top:12px;">
        <div class="card panel"><div class="section-title" style="margin-bottom:10px;">Completed Work Checklist</div><div class="checklist">${checklistHtml}</div></div>
        <div class="card panel"><div class="section-title" style="margin-bottom:10px;">Notes History</div><textarea id="quickNoteInput" placeholder="Add a quick note..." style="min-height:100px;"></textarea><button id="addNoteBtn" class="primary" style="margin-top:8px; width:100%;">Add Timestamped Note</button><div style="margin:12px 0; border-top:1px solid var(--line);"></div><div class="notes-list">${notesHtml}</div></div>
      </div>
      <div class="footer-meta" style="margin-top:12px;">
        <div>Created: ${selected.createdAt ? new Date(selected.createdAt).toLocaleString() : ''}</div>
        <div>Last Updated: ${selected.updatedAt ? new Date(selected.updatedAt).toLocaleString() : ''}</div>
        <div>${selected.completedAt ? `Completed: ${new Date(selected.completedAt).toLocaleString()}` : 'Not completed yet'}</div>
      </div>
    </div>`;

  const detailStatus=document.getElementById('detailStatus');
  const detailWindows=document.getElementById('detailWindows');
  const detailDeviceType=document.getElementById('detailDeviceType');
  renderSelectOptions(detailStatus,statusOptions,false);
  renderSelectOptions(detailWindows,windowsOptions,false);
  renderSelectOptions(detailDeviceType,deviceOptions,false);
  detailStatus.value=selected.status;
  detailWindows.value=selected.windowsEdition;
  detailDeviceType.value=selected.deviceType;

  detailStatus.addEventListener('change',()=>updateSelectedField('status', detailStatus.value));
  detailWindows.addEventListener('change',()=>updateSelectedField('windowsEdition', detailWindows.value));
  detailDeviceType.addEventListener('change',()=>updateSelectedField('deviceType', detailDeviceType.value));

  bindDetailInput('detailRmaNumber','rmaNumber',true);
  bindDetailInput('detailBrandModel','brandModel');
  bindDetailInput('detailSerialNumber','serialNumber');
  bindDetailInput('detailReportedIssues','reportedIssues');
  bindDetailInput('detailPossibleIssues','possibleIssues');

  document.querySelectorAll('[data-warranty-key]').forEach(el => {
    el.addEventListener('change',e => updateSelectedWarrantyFlag(e.target.getAttribute('data-warranty-key'), e.target.checked));
  });
  document.querySelectorAll('[data-check-index]').forEach(el => {
    el.addEventListener('change',e => toggleChecklist(Number(e.target.getAttribute('data-check-index'))));
  });
  document.getElementById('addNoteBtn').addEventListener('click', addNoteFromDetail);
}
function render(){
  renderRecordList();
  renderDetail();
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-tab') === state.tab));
  document.getElementById('statusFilter').value = state.statusFilter;
}
function bindDetailInput(id, field, numeric=false){
  const el=document.getElementById(id);
  el.addEventListener('input',()=>{ const value=numeric ? numbersOnly(el.value) : el.value; if(numeric) el.value=value; updateSelectedField(field,value); });
}
async function updateSelectedField(field, value){
  const selected=getSelectedRecord(); if(!selected) return;
  const oldStatus=selected.status;
  const updatedRecord={...selected,[field]:value};
  if(field==='status') updatedRecord.completedAt=value==='completed' ? new Date().toISOString() : null;
  const saved=await updateRma(selected.id,updatedRecord);
  if(saved){
    state.records=state.records.map(r=>r.id===saved.id?saved:r);
    render();
    if(field==='status' && oldStatus!==saved.status){
      await sendRmaEmail({ eventType:'status_change', orderNumber:saved.orderNumber, rmaNumber:saved.rmaNumber, customerName:saved.customerName, oldStatus, newStatus:saved.status });
    }
  }
}
async function updateSelectedWarrantyFlag(flag, checked){
  const selected=getSelectedRecord(); if(!selected) return;
  const saved=await updateRma(selected.id,{ ...selected, warrantyFlags:{ ...selected.warrantyFlags, [flag]:checked } });
  if(saved){ state.records=state.records.map(r=>r.id===saved.id?saved:r); render(); }
}
async function toggleChecklist(index){
  const selected=getSelectedRecord(); if(!selected) return;
  const saved=await updateRma(selected.id,{ ...selected, checklist:selected.checklist.map((item,i)=>i!==index?item:{...item,done:!item.done,completedAt:!item.done?new Date().toISOString():null}) });
  if(saved){ state.records=state.records.map(r=>r.id===saved.id?saved:r); render(); }
}
async function addNoteFromDetail(){
  const selected=getSelectedRecord(); const input=document.getElementById('quickNoteInput'); if(!selected || !input.value.trim()) return;
  const saved=await updateRma(selected.id,{ ...selected, notes:[{ id:crypto.randomUUID(), text:input.value.trim(), createdAt:new Date().toISOString() }, ...selected.notes] });
  if(saved){ state.records=state.records.map(r=>r.id===saved.id?saved:r); render(); }
}
function populateCreateForm(){
  const form=createDefaultForm();
  document.getElementById('formOrderNumber').value=form.orderNumber;
  document.getElementById('formRmaNumber').value=form.rmaNumber;
  document.getElementById('formCustomerName').value=form.customerName;
  document.getElementById('formBrandModel').value=form.brandModel;
  document.getElementById('formSerialNumber').value=form.serialNumber;
  document.getElementById('formReportedIssues').value=form.reportedIssues;
  document.getElementById('formPossibleIssues').value=form.possibleIssues;
  renderSelectOptions(document.getElementById('formDeviceType'),deviceOptions,false);
  renderSelectOptions(document.getElementById('formStatus'),statusOptions,false);
  renderSelectOptions(document.getElementById('formWindows'),windowsOptions,false);
  document.getElementById('formDeviceType').value=form.deviceType;
  document.getElementById('formStatus').value=form.status;
  document.getElementById('formWindows').value=form.windowsEdition;
  renderWarrantyCheckboxes(document.getElementById('formWarrantyFlags'),form.warrantyFlags,()=>{});
}
function readCreateForm(){
  const warrantyFlags=createDefaultWarrantyFlags();
  document.querySelectorAll('#formWarrantyFlags input[type="checkbox"]').forEach((checkbox,index)=>{ warrantyFlags[warrantyOptions[index].key]=checkbox.checked; });
  return {
    orderNumber:numbersOnly(document.getElementById('formOrderNumber').value.trim()),
    rmaNumber:numbersOnly(document.getElementById('formRmaNumber').value.trim()),
    customerName:document.getElementById('formCustomerName').value.trim(),
    deviceType:document.getElementById('formDeviceType').value,
    brandModel:document.getElementById('formBrandModel').value.trim(),
    serialNumber:document.getElementById('formSerialNumber').value.trim(),
    warrantyFlags,
    windowsEdition:document.getElementById('formWindows').value,
    status:document.getElementById('formStatus').value,
    reportedIssues:document.getElementById('formReportedIssues').value.trim(),
    possibleIssues:document.getElementById('formPossibleIssues').value.trim()
  };
}
async function createRecordFromDialog(){
  const form=readCreateForm(); if(!form.orderNumber || !form.customerName) return;
  const now=new Date().toISOString();
  const record={ ...form, checklist:defaultChecklist.map(item=>({ label:item, done:false, completedAt:null })), notes:[], createdAt:now, updatedAt:now, completedAt:form.status==='completed'?now:null };
  const created=await createRma(record); if(!created) return;
  state.records=[created,...state.records];
  state.selectedId=created.id;
  document.getElementById('rmaDialog').close();
  render();
  await sendRmaEmail({ eventType:'create_rma', orderNumber:created.orderNumber, rmaNumber:created.rmaNumber, customerName:created.customerName, status:created.status, reportedIssues:created.reportedIssues, possibleIssues:created.possibleIssues });
}
async function init(){
  if(SUPABASE_URL.includes('PASTE_YOUR_PROJECT_URL_HERE') || SUPABASE_PUBLISHABLE_KEY.includes('PASTE_YOUR_PUBLISHABLE_KEY_HERE')) showBanner('Supabase URL/key still need to be pasted into index.html before the app can connect.','error');
  else showBanner('Connecting to Supabase...','info');

  renderSelectOptions(document.getElementById('statusFilter'),statusOptions,true);
  populateCreateForm();

  document.getElementById('formOrderNumber').addEventListener('input',e=>e.target.value=numbersOnly(e.target.value));
  document.getElementById('formRmaNumber').addEventListener('input',e=>e.target.value=numbersOnly(e.target.value));
  document.getElementById('searchInput').addEventListener('input',e=>{ state.search=e.target.value; render(); });
  document.getElementById('statusFilter').addEventListener('change',e=>{ state.statusFilter=e.target.value; render(); });
  document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>{ state.tab=btn.getAttribute('data-tab'); render(); }));
  document.getElementById('newRmaBtn').addEventListener('click',()=>{ populateCreateForm(); document.getElementById('rmaDialog').showModal(); });
  document.getElementById('cancelDialogBtn').addEventListener('click',()=>document.getElementById('rmaDialog').close());
  document.getElementById('createDialogBtn').addEventListener('click',createRecordFromDialog);

  state.records=await loadRmas();
  state.selectedId=state.records[0]?.id || null;
  render();
}
init();
</script>
</body>
</html>
