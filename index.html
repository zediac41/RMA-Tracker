<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xotic PC RMA Tracker</title>
  <style>
    :root {
      --bg:#e9edf1; --card:#e7ebef; --line:#c4ced9; --text:#1f2937; --muted:#6b7280; --blue:#4f7db8; --radius:18px; --shadow:0 6px 16px rgba(31,41,55,.04);
    }
    * { box-sizing:border-box; }
    html,body { margin:0; padding:0; font-family:Arial,Helvetica,sans-serif; background:var(--bg); color:var(--text); }
    body { overflow-x:hidden; }
    .app { max-width:1400px; margin:0 auto; padding:12px; }
    .topbar { display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .title h1 { margin:0; font-size:28px; }
    .title p { margin:4px 0 0; color:var(--muted); font-size:14px; }
    button,select,input,textarea { font:inherit; color:var(--text); }
    button { border:1px solid var(--line); background:var(--card); border-radius:14px; padding:10px 14px; cursor:pointer; }
    button.primary { background:var(--blue); color:#f8fafc; border-color:var(--blue); }
    .card { background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); }
    .banner { padding:10px 12px; margin-bottom:12px; border-radius:14px; display:none; }
    .banner.info { display:block; background:#dde6ef; border:1px solid var(--line); color:var(--muted); }
    .banner.error { display:block; background:#efdddd; border:1px solid #d8b7b7; color:#7f1d1d; }
    .layout { display:grid; grid-template-columns:360px minmax(0,1fr); gap:12px; }
    .panel { padding:14px; }
    .filters { display:flex; flex-direction:column; gap:10px; margin-bottom:12px; }
    .tabs { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .tabs button.active { background:var(--blue); color:#f8fafc; border-color:var(--blue); }
    input,select,textarea { width:100%; border:1px solid var(--line); border-radius:12px; padding:10px 12px; background:#e9edf1; }
    input[type="date"] {
      text-align: left;
      appearance: none;
      -webkit-appearance: none;
      min-height: 42px;
    }
    input[type="date"]::-webkit-date-and-time-value {
      text-align: left;
    }
    input[type="date"]::-webkit-datetime-edit {
      text-align: left;
    }
    textarea { min-height:90px; resize:vertical; }
    input[type="checkbox"] { width:16px; height:16px; accent-color:var(--blue); }
    .record-list { display:flex; flex-direction:column; gap:10px; max-height:78vh; overflow:auto; }
    .record-item { padding:14px; border:2px solid var(--line); border-radius:20px; background:#e9edf1; text-align:left; width:100%; }
    .record-item.selected { outline:2px solid #cbd5e1; }
    .record-item.waiting { border-color:var(--blue); }
    .record-top { display:flex; justify-content:space-between; gap:10px; }
    .badge { padding:5px 10px; border-radius:999px; border:1px solid var(--line); font-size:12px; max-width:140px; text-align:center; }
    .muted { color:var(--muted); }
    .small { font-size:12px; line-height:1.35; }
    .summary-small { font-size:11px !important; }
    .tiny { font-size:11px; line-height:1.35; }
    .grid-4,.grid-2,.grid-3 { display:grid; gap:10px; }
    .grid-4 { grid-template-columns:repeat(4,minmax(0,1fr)); }
    .grid-3 { grid-template-columns:repeat(3,minmax(0,1fr)); }
    .grid-2 { grid-template-columns:repeat(2,minmax(0,1fr)); }
    .field,.field-full { display:flex; flex-direction:column; gap:6px; }
    .field label,.section-title { font-size:12px; color:var(--muted); font-weight:700; }
    .warranty-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; }
    .warranty-item {
      display:grid; grid-template-columns:auto 1fr 90px; align-items:center; gap:8px;
      border:1px solid var(--line); border-radius:10px; padding:8px 10px; background:#e9edf1; font-size:11px;
    }
    .warranty-item span { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .warranty-item select { padding:6px 8px; border-radius:8px; }
    .check-item { display:flex; align-items:center; gap:8px; border:1px solid var(--line); border-radius:10px; padding:8px 10px; background:#e9edf1; font-size:11px; }
    .check-item span { flex:1 1 auto; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .two-column { display:grid; grid-template-columns:1.2fr .8fr; gap:12px; }
    .checklist,.notes-list { display:flex; flex-direction:column; gap:8px; }
    .check-item.done span { text-decoration:line-through; color:#94a3b8; }
    .note-box { border:1px solid var(--line); border-radius:14px; padding:12px; background:#e9edf1; }
    .footer-meta { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; color:var(--muted); font-size:12px; }
    dialog { border:none; border-radius:22px; width:min(920px,calc(100vw - 20px)); padding:0; box-shadow:0 20px 60px rgba(15,23,42,.18); background:var(--card); }
    dialog::backdrop { background:rgba(15,23,42,.35); }
    .dialog-inner { padding:16px; }
    .dialog-title { margin:0 0 14px; font-size:20px; }
    .dialog-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:14px; flex-wrap:wrap; }
    .save-bar { display:flex; justify-content:flex-end; gap:8px; margin-top:14px; flex-wrap:wrap; }
    .saving { opacity:.7; pointer-events:none; }
    .empty { padding:30px 16px; text-align:center; color:var(--muted); }
    .photo-box { display:flex; flex-direction:column; gap:10px; }
    .photo-preview { display:block; width:100%; max-width:260px; border:1px solid var(--line); border-radius:12px; overflow:hidden; background:#dfe5eb; }
    .photo-preview img { display:block; width:100%; height:auto; }
    .photo-link { text-decoration:none; color:var(--blue); font-size:12px; }
    .serial-photo-btn {
      border:2px solid #7d8998 !important;
      background:#dfe5eb !important;
      color:var(--text) !important;
      font-size:12px;
      font-weight:600;
    }
    .serial-photo-actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .hidden { display:none !important; }

    
    .image-modal {
      display:none; position:fixed; inset:0; background:rgba(15,23,42,.7); z-index:1000;
      align-items:center; justify-content:center; padding:20px;
    }
    .image-modal.open { display:flex; }
    .image-modal-card {
      background:var(--card); border:1px solid var(--line); border-radius:16px; padding:12px; max-width:min(95vw,900px); max-height:95vh;
      box-shadow:0 20px 60px rgba(15,23,42,.25);
    }
    .image-modal-card img { display:block; max-width:100%; max-height:calc(95vh - 80px); border-radius:10px; }
    .image-modal-actions { display:flex; justify-content:flex-end; margin-top:10px; }

    @media (max-width:1100px){ .layout,.two-column{grid-template-columns:1fr}.grid-4{grid-template-columns:repeat(2,minmax(0,1fr))} }
    @media (max-width:700px){ .grid-4,.grid-2,.grid-3,.warranty-grid,.footer-meta{grid-template-columns:1fr 1fr}.topbar{flex-direction:column;align-items:stretch} }
    @media (max-width:520px){ .grid-4,.grid-2,.grid-3,.warranty-grid,.footer-meta,.tabs{grid-template-columns:1fr} button.primary{width:100%} .warranty-item{grid-template-columns:auto 1fr} .warranty-item select{grid-column:1 / -1;} }
  </style>
</head>
<body>
<div class="app">
  <div id="statusBanner" class="banner"></div>
  <div class="topbar">
    <div class="title">
      <h1>Xotic PC RMA Tracker</h1>
      <p>Phone-friendly tracking for diagnostics, notes, status updates, and completed work.</p>
    </div>
    <button id="newRmaBtn" class="primary">New RMA</button>
  </div>

  <div class="layout">
    <div>
      <div class="card panel filters">
        <input id="searchInput" type="text" placeholder="Search order, customer..." />
        <div class="tabs">
          <button data-tab="active" class="tab-btn active">Active</button>
          <button data-tab="completed" class="tab-btn">Completed</button>
          <button data-tab="all" class="tab-btn">All</button>
        </div>
        <select id="statusFilter"></select>
      </div>
      <div id="recordList" class="record-list"></div>
    </div>
    <div id="detailView"></div>
  </div>
</div>


<div id="serialPhotoModal" class="image-modal" aria-hidden="true">
  <div class="image-modal-card">
    <img id="serialPhotoModalImg" src="" alt="Serial number photo" />
    <div class="image-modal-actions">
      <button id="closeSerialPhotoModal">Close</button>
    </div>
  </div>
</div>

<dialog id="rmaDialog">
  <div class="dialog-inner">
    <h2 class="dialog-title">Create RMA Record</h2>
    <div class="grid-4">
      <div class="field"><label>Order Number</label><input id="formOrderNumber" inputmode="numeric" pattern="[0-9]*" /></div>
      <div class="field"><label>Customer Name</label><input id="formCustomerName" /></div>
      <div class="field"><label>Device Type</label><select id="formDeviceType"></select></div>
      <div class="field"><label>RMA Number</label><input id="formRmaNumber" inputmode="numeric" pattern="[0-9]*" /></div>
      <div class="field"><label>Status</label><select id="formStatus"></select></div>
      <div class="field"><label>Brand / Model</label><input id="formBrandModel" /></div>
    </div>

    <div class="field-full" style="margin-top:12px;">
      <label>Serial Number</label>
      <div class="photo-box">
        <div id="formSerialPhotoWrap"><input id="formSerialPhoto" type="file" accept="image/*" /></div>
        <div id="formSerialPhotoPreview" class="small muted">No image selected.</div>
      </div>
    </div>

    <div class="field-full" style="margin-top:12px;"><label>Reported Issues</label><textarea id="formReportedIssues"></textarea></div>
    <div class="field-full" style="margin-top:12px;"><label>Possible Issues / Observations</label><textarea id="formPossibleIssues"></textarea></div>
    <div class="dialog-actions">
      <button id="cancelDialogBtn">Cancel</button>
      <button id="createDialogBtn" class="primary">Create RMA</button>
    </div>
  </div>
</dialog>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://kcdhkjjebgwxozgwjfnm.supabase.co';
const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_6p3LaQ8Pkmm7UL00i9GMdA_r9wc_KRX';
const supabase = createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

const defaultChecklist = ['Visual inspection completed','Boot test completed','Temps checked','RAM tested','Drive tested','Windows & drivers updated','BIOS updated','OCCT / Burn-in Completed','OS reinstalled','Manufacturer contacted','Need Manufacturer Repair','Passed QA'];
const statusOptions = [
  { value:'diagnosing', label:'Diagnosing' },
  { value:'waiting_parts', label:'Waiting on Parts' },
  { value:'waiting_customer', label:'Waiting on Customer' },
  { value:'need_manufacturer_repair', label:'Need Manufacturer Repair' },
  { value:'repair_progress', label:'Repair/Testing' },
  { value:'pay_shipping', label:'Pay for Shipping' },
  { value:'completed', label:'Completed' }
];
const windowsOptions = [{value:'home',label:'Home'},{value:'pro',label:'Pro'}];
const deviceOptions = [{value:'desktop',label:'Desktop'},{value:'laptop',label:'Laptop'},{value:'other',label:'Other'}];
const warrantyOptions = [
  { key:'inWarranty', label:'In Manufacturer Warranty' },
  { key:'adp', label:'ADP' },
  { key:'partsLabor', label:'Parts & Labor' },
  { key:'shipping', label:'Shipping' }
];
const state = { records:[], selectedId:null, search:'', tab:'active', statusFilter:'all', createSerialPhotoData:'' };

const showBanner = (m,v='info') => { const el=document.getElementById('statusBanner'); el.textContent=m; el.className=`banner ${v}`; };
const clearBanner = () => { const el=document.getElementById('statusBanner'); el.textContent=''; el.className='banner'; };
const numbersOnly = (v) => String(v ?? '').replace(/\D+/g,'');
const statusLabel = (s) => statusOptions.find(x => x.value === s)?.label || s;
const deviceLabel = (t) => t === 'laptop' ? 'Laptop' : t === 'other' ? 'Other' : 'Desktop';
const createDefaultForm = () => ({
  orderNumber:'', rmaNumber:'', customerName:'', deviceType:'desktop', purchaseDate:'', brandModel:'',
  warranty:{ inWarranty:{ enabled:false, years:'' }, adp:{ enabled:false, years:'' }, partsLabor:{ enabled:false, years:'' }, shipping:{ enabled:false, years:'' } },
  windowsEdition:'home', status:'diagnosing', reportedIssues:'', possibleIssues:'', serialPhotoData:''
});
const escapeHtml = (v) => String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const escapeAttr = (v) => escapeHtml(v).replace(/`/g,'&#96;');

function warrantyFromRow(row){
  const years = row.warranty_years_json || {};
  return {
    inWarranty:{ enabled:Boolean(row.in_manufacturer_warranty), years:years.inWarranty || '' },
    adp:{ enabled:Boolean(row.adp), years:years.adp || '' },
    partsLabor:{ enabled:Boolean(row.parts_labor), years:years.partsLabor || '' },
    shipping:{ enabled:Boolean(row.shipping), years:years.shipping || '' }
  };
}
function warrantyToRow(warranty){
  return {
    in_manufacturer_warranty:Boolean(warranty.inWarranty?.enabled),
    adp:Boolean(warranty.adp?.enabled),
    parts_labor:Boolean(warranty.partsLabor?.enabled),
    shipping:Boolean(warranty.shipping?.enabled),
    warranty_years_json:{
      inWarranty:warranty.inWarranty?.years || '',
      adp:warranty.adp?.years || '',
      partsLabor:warranty.partsLabor?.years || '',
      shipping:warranty.shipping?.years || ''
    }
  };
}
function mapRowToRecord(row){
  return {
    id:row.id,
    orderNumber:row.order_number || '',
    rmaNumber:row.rma_number || '',
    customerName:row.customer_name || '',
    deviceType:row.device_type || 'desktop',
    purchaseDate:row.purchase_date || '',
    brandModel:row.brand_model || '',
    serialPhotoData:row.serial_photo_data || '',
    warranty:warrantyFromRow(row),
    windowsEdition:row.windows_edition || 'home',
    status:row.status || 'diagnosing',
    reportedIssues:row.reported_issues || '',
    possibleIssues:row.possible_issues || '',
    checklist:Array.isArray(row.checklist_json) ? row.checklist_json : defaultChecklist.map(label => ({ label, done:false, completedAt:null })),
    notes:Array.isArray(row.notes_json) ? row.notes_json : [],
    createdAt:row.created_at || '',
    updatedAt:row.updated_at || '',
    completedAt:row.completed_at || null,
    lastStatusChangeAt:row.last_status_change_at || row.created_at || ''
  };
}
function mapRecordToRow(record){
  return {
    order_number:record.orderNumber,
    rma_number:record.rmaNumber,
    customer_name:record.customerName,
    device_type:record.deviceType,
    purchase_date:record.purchaseDate || null,
    brand_model:record.brandModel,
    serial_photo_data:record.serialPhotoData || '',
    windows_edition:record.windowsEdition,
    status:record.status,
    reported_issues:record.reportedIssues,
    possible_issues:record.possibleIssues,
    checklist_json:record.checklist,
    notes_json:record.notes,
    completed_at:record.completedAt,
    last_status_change_at:record.lastStatusChangeAt || null,
    ...warrantyToRow(record.warranty)
  };
}
function warrantySummary(w){
  return warrantyOptions.map(opt => {
    const item = w[opt.key];
    if (!item?.enabled) return null;
    return `${opt.label}${item.years ? ' - ' + item.years + ' yr' : ''}`;
  }).filter(Boolean).join(', ');
}
function renderWarrantyGrid(container, warranty, onChange){
  container.innerHTML = '';
  warrantyOptions.forEach(opt => {
    const item = warranty[opt.key] || { enabled:false, years:'' };
    const label = document.createElement('label');
    label.className = 'warranty-item';

    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.checked = Boolean(item.enabled);

    const span = document.createElement('span');
    span.textContent = opt.label;

    const select = document.createElement('select');
    select.innerHTML = '<option value="">Years</option><option value="1">1 yr</option><option value="2">2 yr</option><option value="3">3 yr</option><option value="4">4 yr</option><option value="5">5 yr</option>';
    select.value = item.years || '';
    select.disabled = !item.enabled;

    checkbox.addEventListener('change', () => {
      select.disabled = !checkbox.checked;
      if (!checkbox.checked) select.value = '';
      onChange(opt.key, { enabled:checkbox.checked, years:checkbox.checked ? select.value : '' });
    });
    select.addEventListener('change', () => {
      onChange(opt.key, { enabled:checkbox.checked, years:select.value });
    });

    label.append(checkbox, span, select);
    container.appendChild(label);
  });
}

async function compressImageFile(file, maxDimension = 1600, quality = 0.72){
  const dataUrl = await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });

  const img = await new Promise((resolve, reject) => {
    const image = new Image();
    image.onload = () => resolve(image);
    image.onerror = reject;
    image.src = dataUrl;
  });

  let width = img.width;
  let height = img.height;
  const scale = Math.min(1, maxDimension / Math.max(width, height));
  width = Math.max(1, Math.round(width * scale));
  height = Math.max(1, Math.round(height * scale));

  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, width, height);

  return canvas.toDataURL('image/jpeg', quality);
}

async function fileToDataUrl(file){
  return await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function renderPhotoPreview(containerId, data, options = {}){
  const el = document.getElementById(containerId);
  const {
    viewButtonId = 'viewSerialPhotoBtn',
    deleteButtonId = 'deleteSerialPhotoBtn',
    onDelete = null
  } = options;

  if (!data) {
    el.innerHTML = '<span class="small muted">No photo selected.</span>';
    return;
  }

  el.innerHTML = `
    <div class="serial-photo-actions">
      <button type="button" id="${viewButtonId}" class="serial-photo-btn">View serial number</button>
      <button type="button" id="${deleteButtonId}">Delete photo</button>
    </div>
  `;

  const viewBtn = document.getElementById(viewButtonId);
  if (viewBtn) {
    viewBtn.addEventListener('click', () => openSerialPhotoModal(data));
  }

  const deleteBtn = document.getElementById(deleteButtonId);
  if (deleteBtn && onDelete) {
    deleteBtn.addEventListener('click', onDelete);
  }
}


async function sendRmaEmail(payload){
  const { error } = await supabase.functions.invoke('send-rma-email', { body: payload });
  if (error) { console.error('Email function failed:', error); showBanner('Email send failed, but database save still worked.', 'error'); }
}
async function loadRmas(){
  const { data, error } = await supabase.from('rmas').select('*').order('created_at', { ascending:false });
  if (error) { console.error(error); showBanner('Supabase load failed. Check your URL/key and table columns.', 'error'); return []; }
  clearBanner(); return (data || []).map(mapRowToRecord);
}
async function createRma(record){
  const { data, error } = await supabase.from('rmas').insert([mapRecordToRow(record)]).select();
  if (error) { console.error(error); showBanner('Create RMA failed. Check table columns and RLS.', 'error'); return null; }
  clearBanner(); return data?.[0] ? mapRowToRecord(data[0]) : null;
}
async function updateRma(id, updates){
  const { data, error } = await supabase.from('rmas').update({ ...mapRecordToRow(updates), updated_at:new Date().toISOString() }).eq('id', id).select();
  if (error) { console.error(error); showBanner('Update failed. Check table columns and RLS.', 'error'); return null; }
  clearBanner(); return data?.[0] ? mapRowToRecord(data[0]) : null;
}
function getFilteredRecords(){
  return state.records
    .filter(r => state.tab === 'active' ? r.status !== 'completed' : state.tab === 'completed' ? r.status === 'completed' : true)
    .filter(r => state.statusFilter === 'all' ? true : r.status === state.statusFilter)
    .filter(r => [r.orderNumber, r.rmaNumber, r.customerName, r.brandModel, r.reportedIssues, r.possibleIssues].join(' ').toLowerCase().includes(state.search.toLowerCase()))
    .sort((a,b) => new Date(b.updatedAt || b.createdAt || 0) - new Date(a.updatedAt || a.createdAt || 0));
}
function getSelectedRecord(){ const filtered=getFilteredRecords(); return state.records.find(r => r.id === state.selectedId) || filtered[0] || null; }
function renderSelectOptions(select, options, includeAll){
  select.innerHTML='';
  if (includeAll) {
    const opt=document.createElement('option'); opt.value='all'; opt.textContent='All Statuses'; select.appendChild(opt);
  }
  options.forEach(option => {
    const opt=document.createElement('option'); opt.value=option.value; opt.textContent=option.label; select.appendChild(opt);
  });
}
function renderRecordList(){
  const list=document.getElementById('recordList'); const filtered=getFilteredRecords(); list.innerHTML='';
  if (!filtered.length) {
    const empty=document.createElement('div'); empty.className='card empty'; empty.innerHTML='<div>No RMAs yet</div><div class="small">Create your first RMA record to start tracking notes, tasks, and status updates.</div>'; list.appendChild(empty); return;
  }
  filtered.forEach(record => {
    const btn=document.createElement('button'); btn.className='record-item';
    if (record.id === state.selectedId) btn.classList.add('selected');
    if (['waiting_parts','waiting_customer','need_manufacturer_repair','pay_shipping'].includes(record.status)) btn.classList.add('waiting');
    btn.innerHTML = `
      <div class="record-top">
        <div>
          <div><strong>${escapeHtml('#' + record.orderNumber)}</strong>${record.rmaNumber ? `<span class="muted small"> / ${escapeHtml(record.rmaNumber)}</span>` : ''}</div>
          <div class="muted small">${escapeHtml(record.customerName)}</div>
        </div>
        <div class="badge">${escapeHtml(statusLabel(record.status))}</div>
      </div>
      <div class="muted small" style="margin-top:8px;">${escapeHtml(deviceLabel(record.deviceType))}${record.brandModel ? ' • ' + escapeHtml(record.brandModel) : ''}</div>
      <div style="margin-top:8px;" class="small">${escapeHtml(record.reportedIssues || 'No reported issue entered.')}</div>
      <div class="muted tiny" style="margin-top:8px; display:flex; justify-content:space-between; gap:8px;">
        <span>${record.notes.length} notes</span>
        <span>${record.updatedAt ? new Date(record.updatedAt).toLocaleDateString() : ''}</span>
      </div>`;
    btn.addEventListener('click',()=>{ state.selectedId=record.id; render(); });
    list.appendChild(btn);
  });
}
function renderDetail(){
  const detail=document.getElementById('detailView'); const selected=getSelectedRecord();
  if (!selected) { detail.innerHTML='<div class="card empty">Select or create an RMA.</div>'; return; }

  const checklistHtml=selected.checklist.map((item,index)=>`<label class="check-item ${item.done ? 'done' : ''}"><input type="checkbox" data-check-index="${index}" ${item.done ? 'checked' : ''} /><span>${escapeHtml(item.label)}</span></label>`).join('');
  const notesHtml=selected.notes.length ? selected.notes.map(note=>`<div class="note-box"><div class="small">${escapeHtml(note.text)}</div><div class="muted tiny" style="margin-top:8px;">${new Date(note.createdAt).toLocaleString()}</div></div>`).join('') : '<div class="muted small">No notes added yet.</div>';

  detail.innerHTML = `
    <div class="card panel">
      <div class="detail-header">
        <div>
          <h2 style="margin:0; font-size:24px;">${escapeHtml('Order #' + selected.orderNumber + (selected.rmaNumber ? ' / ' + selected.rmaNumber : ''))}</h2>
          <div class="muted">${escapeHtml(selected.customerName)}</div>
        </div>
      </div>

      <div class="grid-4">
        <div class="field"><label>Status</label><select id="detailStatus"></select></div>
        <div class="field"><label>Windows</label><select id="detailWindows"></select></div>
        <div class="field"><label>Device Type</label><select id="detailDeviceType"></select></div>
        <div class="field"><label>RMA Number</label><input id="detailRmaNumber" inputmode="numeric" pattern="[0-9]*" value="${escapeAttr(selected.rmaNumber || '')}" /></div>
      </div>

      <div class="grid-3" style="margin-top:12px;">
        <div class="field"><label>Purchase Date</label><input id="detailPurchaseDate" type="date" value="${escapeAttr(selected.purchaseDate || '')}" /></div>
        <div class="field"><label>Brand / Model</label><input id="detailBrandModel" value="${escapeAttr(selected.brandModel)}" /></div>
        <div class="field"><label>Warranty Summary</label><input style="font-size:11px;" value="${escapeAttr(warrantySummary(selected.warranty))}" readonly /></div>
      </div>

      <div style="margin-top:12px;">
        <div class="section-title">Warranty</div>
        <div id="detailWarrantyGrid" class="warranty-grid"></div>
      </div>

      <div class="field-full" style="margin-top:12px;">
        <label>Serial Number</label>
        <div class="photo-box">
          <div id="detailSerialPhotoWrap"><input id="detailSerialPhoto" type="file" accept="image/*" /></div>
          <div id="detailSerialPhotoPreview"></div>
        </div>
      </div>

      <div class="grid-2" style="margin-top:12px;">
        <div class="field"><label>Reported Issues</label><textarea id="detailReportedIssues">${escapeHtml(selected.reportedIssues)}</textarea></div>
        <div class="field"><label>Possible Issues / Observations</label><textarea id="detailPossibleIssues">${escapeHtml(selected.possibleIssues)}</textarea></div>
      </div>

      <div class="two-column" style="margin-top:12px;">
        <div class="card panel"><div class="section-title" style="margin-bottom:10px;">Completed Work Checklist</div><div class="checklist">${checklistHtml}</div></div>
        <div class="card panel"><div class="section-title" style="margin-bottom:10px;">Notes History</div><textarea id="quickNoteInput" placeholder="Add a quick note..." style="min-height:100px;"></textarea><button id="addNoteBtn" class="primary" style="margin-top:8px; width:100%;">Add Timestamped Note</button><div style="margin:12px 0; border-top:1px solid var(--line);"></div><div class="notes-list">${notesHtml}</div></div>
      </div>
      <div class="save-bar"><button id="saveDetailBtn" class="primary">Save Changes</button></div>

      <div class="footer-meta" style="margin-top:12px;">
        <div>Created: ${selected.createdAt ? new Date(selected.createdAt).toLocaleString() : ''}</div>
        <div>Last Updated: ${selected.updatedAt ? new Date(selected.updatedAt).toLocaleString() : ''}</div>
        <div>${selected.completedAt ? `Completed: ${new Date(selected.completedAt).toLocaleString()}` : 'Not completed yet'}</div>
      </div>
    </div>`;

  const detailStatus=document.getElementById('detailStatus');
  const detailWindows=document.getElementById('detailWindows');
  const detailDeviceType=document.getElementById('detailDeviceType');
  renderSelectOptions(detailStatus,statusOptions,false);
  renderSelectOptions(detailWindows,windowsOptions,false);
  renderSelectOptions(detailDeviceType,deviceOptions,false);
  detailStatus.value=selected.status;
  detailWindows.value=selected.windowsEdition;
  detailDeviceType.value=selected.deviceType;

  // Field edits are saved with the Save Changes button instead of live.

  renderWarrantyGrid(document.getElementById('detailWarrantyGrid'), selected.warranty, () => {});
  const detailPhotoInput = document.getElementById('detailSerialPhoto');
  const detailPhotoWrap = document.getElementById('detailSerialPhotoWrap');
  if (detailPhotoWrap) detailPhotoWrap.classList.toggle('hidden', Boolean(selected.serialPhotoData));
  renderPhotoPreview('detailSerialPhotoPreview', selected.serialPhotoData, {
    viewButtonId: 'detailViewSerialPhotoBtn',
    deleteButtonId: 'detailDeleteSerialPhotoBtn',
    onDelete: async () => {
      if (!confirm('Delete this serial number photo?')) return;
      const current = getSelectedRecord();
      const saved = await updateRma(current.id, { ...current, serialPhotoData:'' });
      if (saved) {
        state.records = state.records.map(r => r.id === saved.id ? saved : r);
        render();
      }
    }
  });

  document.getElementById('detailSerialPhoto').addEventListener('change', async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const dataUrl = await compressImageFile(file);
    const current = getSelectedRecord();
    const saved = await updateRma(current.id, { ...current, serialPhotoData:dataUrl });
    if (saved) {
      state.records = state.records.map(r => r.id === saved.id ? saved : r);
      render();
    }
  });

  document.querySelectorAll('[data-check-index]').forEach(el => {
    el.addEventListener('change',e => toggleChecklist(Number(e.target.getAttribute('data-check-index'))));
  });
  document.getElementById('addNoteBtn').addEventListener('click', addNoteFromDetail);
  const saveBtn = document.getElementById('saveDetailBtn');
  if (saveBtn) saveBtn.addEventListener('click', saveDetailChanges);
}

function readDetailFormValues(selected){
  const warranty = JSON.parse(JSON.stringify(selected.warranty || createDefaultForm().warranty));
  document.querySelectorAll('#detailWarrantyGrid .warranty-item').forEach((item, index) => {
    const key = warrantyOptions[index].key;
    const checkbox = item.querySelector('input[type="checkbox"]');
    const select = item.querySelector('select');
    warranty[key] = {
      enabled: checkbox ? checkbox.checked : false,
      years: checkbox && checkbox.checked && select ? (select.value || '') : ''
    };
  });

  return {
    ...selected,
    status: document.getElementById('detailStatus')?.value || selected.status,
    windowsEdition: document.getElementById('detailWindows')?.value || selected.windowsEdition,
    deviceType: document.getElementById('detailDeviceType')?.value || selected.deviceType,
    rmaNumber: document.getElementById('detailRmaNumber') ? numbersOnly(document.getElementById('detailRmaNumber').value) : selected.rmaNumber,
    purchaseDate: document.getElementById('detailPurchaseDate')?.value || '',
    brandModel: document.getElementById('detailBrandModel')?.value?.trim?.() || selected.brandModel,
    reportedIssues: document.getElementById('detailReportedIssues')?.value?.trim?.() || selected.reportedIssues,
    possibleIssues: document.getElementById('detailPossibleIssues')?.value?.trim?.() || selected.possibleIssues,
    warranty
  };
}

async function saveDetailChanges(){
  const selected = getSelectedRecord();
  if (!selected) return;

  const oldStatus = selected.status;
  const previousCheckpoint = selected.lastStatusChangeAt || selected.createdAt || '';
  const updatedRecord = readDetailFormValues(selected);

  if (updatedRecord.status !== selected.status) {
    const nowIso = new Date().toISOString();
    updatedRecord.completedAt = updatedRecord.status === 'completed' ? nowIso : null;
    updatedRecord.lastStatusChangeAt = nowIso;
  } else {
    updatedRecord.completedAt = selected.completedAt;
    updatedRecord.lastStatusChangeAt = selected.lastStatusChangeAt;
  }

  const btn = document.getElementById('saveDetailBtn');
  if (btn) {
    btn.disabled = true;
    btn.textContent = 'Saving...';
  }

  const saved = await updateRma(selected.id, updatedRecord);

  if (btn) {
    btn.disabled = false;
    btn.textContent = 'Save Changes';
  }

  if (saved) {
    state.records = state.records.map(r => r.id === saved.id ? saved : r);
    render();

    if (updatedRecord.status !== oldStatus) {
      const changedNotes = (saved.notes || []).filter(note => !previousCheckpoint || (note.createdAt && note.createdAt > previousCheckpoint));
      const changedChecklist = (saved.checklist || []).filter(item => item?.done && item?.completedAt && (!previousCheckpoint || item.completedAt > previousCheckpoint));
      sendRmaEmail({
        eventType:'status_change',
        rmaNumber:saved.rmaNumber,
        oldStatus,
        newStatus:saved.status,
        checklist:changedChecklist,
        notes:changedNotes
      });
    }
  }
}


function render(){
  renderRecordList();
  renderDetail();
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-tab') === state.tab));
  document.getElementById('statusFilter').value = state.statusFilter;
}
function bindDetailInput(id, field, numeric=false){
  const el=document.getElementById(id);
  el.addEventListener('input',()=>{ const value=numeric ? numbersOnly(el.value) : el.value; if(numeric) el.value=value; updateSelectedField(field,value); });
}
async function updateSelectedField(field, value){
  const selected=getSelectedRecord(); if(!selected) return;
  const oldStatus=selected.status;
  const previousCheckpoint = selected.lastStatusChangeAt || selected.createdAt || '';
  const updatedRecord={...selected,[field]:value};
  if(field==='status') {
    const nowIso = new Date().toISOString();
    updatedRecord.completedAt = value==='completed' ? nowIso : null;
    updatedRecord.lastStatusChangeAt = nowIso;
  }
  const saved=await updateRma(selected.id,updatedRecord);
  if(saved){
    state.records=state.records.map(r=>r.id===saved.id?saved:r);
    render();
    if(field==='status' && oldStatus!==saved.status){
      const changedNotes = (saved.notes || []).filter(note => !previousCheckpoint || (note.createdAt && note.createdAt > previousCheckpoint));
      await sendRmaEmail({
        eventType:'status_change',
        orderNumber:saved.orderNumber,
        rmaNumber:saved.rmaNumber,
        customerName:saved.customerName,
        oldStatus,
        newStatus:saved.status,
        checklist:saved.checklist || [],
        notes:changedNotes
      });
    }
  }
}
async function toggleChecklist(index){
  const selected=getSelectedRecord(); if(!selected) return;
  const saved=await updateRma(selected.id,{ ...selected, checklist:selected.checklist.map((item,i)=>i!==index?item:{...item,done:!item.done,completedAt:!item.done?new Date().toISOString():null}) });
  if(saved){ state.records=state.records.map(r=>r.id===saved.id?saved:r); render(); }
}
async function addNoteFromDetail(){
  const selected=getSelectedRecord(); const input=document.getElementById('quickNoteInput'); if(!selected || !input.value.trim()) return;
  const saved=await updateRma(selected.id,{ ...selected, notes:[{ id:crypto.randomUUID(), text:input.value.trim(), createdAt:new Date().toISOString() }, ...selected.notes] });
  if(saved){ state.records=state.records.map(r=>r.id===saved.id?saved:r); render(); }
}
function populateCreateForm(){
  const form=createDefaultForm();
  document.getElementById('formOrderNumber').value=form.orderNumber;
  document.getElementById('formRmaNumber').value=form.rmaNumber;
  document.getElementById('formCustomerName').value=form.customerName;
  document.getElementById('formBrandModel').value=form.brandModel;
  document.getElementById('formReportedIssues').value=form.reportedIssues;
  document.getElementById('formPossibleIssues').value=form.possibleIssues;
  renderSelectOptions(document.getElementById('formDeviceType'),deviceOptions,false);
  renderSelectOptions(document.getElementById('formStatus'),statusOptions,false);
  document.getElementById('formDeviceType').value=form.deviceType;
  document.getElementById('formStatus').value=form.status;
  renderPhotoPreview('formSerialPhotoPreview', '');
  state.createSerialPhotoData = '';
  document.getElementById('formSerialPhoto').value = '';
  const createWrap = document.getElementById('formSerialPhotoWrap');
  if (createWrap) createWrap.classList.remove('hidden');
}
function readWarrantyGrid(containerId){
  const result = createDefaultForm().warranty;
  document.querySelectorAll(`#${containerId} .warranty-item`).forEach((item, index) => {
    const key = warrantyOptions[index].key;
    const checkbox = item.querySelector('input[type="checkbox"]');
    const select = item.querySelector('select');
    result[key] = { enabled:checkbox.checked, years:checkbox.checked ? (select.value || '') : '' };
  });
  return result;
}
function readCreateForm(){
  const purchaseDateEl = document.getElementById('formPurchaseDate');
  const warrantyGridEl = document.getElementById('formWarrantyGrid');
  const windowsEl = document.getElementById('formWindows');

  return {
    orderNumber:numbersOnly(document.getElementById('formOrderNumber').value.trim()),
    rmaNumber:numbersOnly(document.getElementById('formRmaNumber').value.trim()),
    customerName:document.getElementById('formCustomerName').value.trim(),
    deviceType:document.getElementById('formDeviceType').value,
    purchaseDate:purchaseDateEl ? purchaseDateEl.value : '',
    brandModel:document.getElementById('formBrandModel').value.trim(),
    warranty:warrantyGridEl ? readWarrantyGrid('formWarrantyGrid') : createDefaultForm().warranty,
    windowsEdition:windowsEl ? windowsEl.value : 'home',
    status:document.getElementById('formStatus').value,
    reportedIssues:document.getElementById('formReportedIssues').value.trim(),
    possibleIssues:document.getElementById('formPossibleIssues').value.trim(),
    serialPhotoData:state.createSerialPhotoData || ''
  };
}
async function createRecordFromDialog(){
  const form = readCreateForm();
  if (!form.orderNumber || !form.customerName) return;

  const btn = document.getElementById('createDialogBtn');
  const dialog = document.getElementById('rmaDialog');

  if (btn) {
    btn.disabled = true;
    btn.textContent = 'Creating...';
  }
  if (dialog) dialog.classList.add('saving');

  const now = new Date().toISOString();
  const record = {
    ...form,
    checklist: defaultChecklist.map(item => ({ label:item, done:false, completedAt:null })),
    notes: [],
    createdAt: now,
    updatedAt: now,
    completedAt: form.status === 'completed' ? now : null,
    lastStatusChangeAt: now
  };

  const created = await createRma(record);

  if (btn) {
    btn.disabled = false;
    btn.textContent = 'Create RMA';
  }
  if (dialog) dialog.classList.remove('saving');

  if (!created) return;

  state.records = [created, ...state.records];
  state.selectedId = created.id;
  document.getElementById('rmaDialog').close();
  render();

  sendRmaEmail({
    eventType:'create_rma',
    orderNumber:created.orderNumber,
    rmaNumber:created.rmaNumber,
    customerName:created.customerName,
    deviceType:created.deviceType,
    brandModel:created.brandModel,
    serialPhotoData:created.serialPhotoData || '',
    reportedIssues:created.reportedIssues,
    possibleIssues:created.possibleIssues
  });
}

function openSerialPhotoModal(data){
  const modal = document.getElementById('serialPhotoModal');
  const img = document.getElementById('serialPhotoModalImg');
  img.src = data;
  modal.classList.add('open');
  modal.setAttribute('aria-hidden', 'false');
}
function closeSerialPhotoModal(){
  const modal = document.getElementById('serialPhotoModal');
  const img = document.getElementById('serialPhotoModalImg');
  img.src = '';
  modal.classList.remove('open');
  modal.setAttribute('aria-hidden', 'true');
}

async function init(){
  if(SUPABASE_URL.includes('PASTE_YOUR_PROJECT_URL_HERE') || SUPABASE_PUBLISHABLE_KEY.includes('PASTE_YOUR_PUBLISHABLE_KEY_HERE')) showBanner('Supabase URL/key still need to be pasted into index.html before the app can connect.','error');
  else showBanner('Connecting to Supabase...','info');

  renderSelectOptions(document.getElementById('statusFilter'),statusOptions,true);
  populateCreateForm();

  document.getElementById('formOrderNumber').addEventListener('input',e=>e.target.value=numbersOnly(e.target.value));
  document.getElementById('formRmaNumber').addEventListener('input',e=>e.target.value=numbersOnly(e.target.value));
  document.getElementById('searchInput').addEventListener('input',e=>{ state.search=e.target.value; render(); });
  document.getElementById('statusFilter').addEventListener('change',e=>{ state.statusFilter=e.target.value; render(); });
  document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>{ state.tab=btn.getAttribute('data-tab'); render(); }));
  document.getElementById('closeSerialPhotoModal').addEventListener('click', closeSerialPhotoModal);
  document.getElementById('serialPhotoModal').addEventListener('click', (e) => {
    if (e.target.id === 'serialPhotoModal') closeSerialPhotoModal();
  });

  document.getElementById('newRmaBtn').addEventListener('click',()=>{ populateCreateForm(); document.getElementById('rmaDialog').showModal(); });
  document.getElementById('cancelDialogBtn').addEventListener('click',()=>document.getElementById('rmaDialog').close());
  document.getElementById('createDialogBtn').addEventListener('click',createRecordFromDialog);
  document.getElementById('formSerialPhoto').addEventListener('change', async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    state.createSerialPhotoData = await compressImageFile(file);
    e.target.value = '';
    const wrap = document.getElementById('formSerialPhotoWrap');
    if (wrap) wrap.classList.add('hidden');
    renderPhotoPreview('formSerialPhotoPreview', state.createSerialPhotoData, {
      viewButtonId: 'createViewSerialPhotoBtn',
      deleteButtonId: 'createDeleteSerialPhotoBtn',
      onDelete: () => {
        if (!confirm('Delete this serial number photo?')) return;
        state.createSerialPhotoData = '';
        const input = document.getElementById('formSerialPhoto');
        const wrap = document.getElementById('formSerialPhotoWrap');
        input.value = '';
        if (wrap) wrap.classList.remove('hidden');
        renderPhotoPreview('formSerialPhotoPreview', '');
      }
    });
  });

  state.records=await loadRmas();
  state.selectedId=state.records[0]?.id || null;
  render();
}
init();
</script>
</body>
